name: Publish Chrome Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Submit the uploaded package for Chrome Web Store review"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: chrome-web-store-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Test, package, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify tag matches manifest version
        if: github.event_name == 'push'
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          manifest_version=$(jq -r '.version' manifest.json)
          tag_version="${TAG_NAME#v}"

          if [ "$manifest_version" != "$tag_version" ]; then
            echo "Tag version ($tag_version) does not match manifest.json version ($manifest_version)." >&2
            echo "Update manifest.json before tagging, otherwise the wrong version is uploaded." >&2
            exit 1
          fi

          echo "Publishing version $manifest_version"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        # playwright.config.js 는 channel: "chrome" 만 쓰므로 chrome 만 받는다.
        run: npx playwright install --with-deps chrome

      - name: Run tests
        run: npm run pw:test

      - name: Package extension
        run: npm run package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension-package
          path: dist/*.zip
          if-no-files-found: error

      - name: Verify Chrome Web Store secrets
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_WEBSTORE_PUBLISHER_ID: ${{ secrets.CHROME_WEBSTORE_PUBLISHER_ID }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          required=(
            CHROME_EXTENSION_ID
            CHROME_WEBSTORE_PUBLISHER_ID
            GCP_SERVICE_ACCOUNT_KEY
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Upload package and optionally publish to Chrome Web Store
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_WEBSTORE_PUBLISHER_ID: ${{ secrets.CHROME_WEBSTORE_PUBLISHER_ID }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          SHOULD_PUBLISH: ${{ github.event_name == 'push' || inputs.publish == true }}
        run: |
          # 서비스 계정 키로 JWT 를 직접 서명해 access token 을 받는다.
          # google-github-actions/auth 의 token_format: access_token 은 IAM Credentials
          # API 로 자기 자신을 impersonate 하려 해서 serviceAccountTokenCreator 권한을
          # 추가로 요구한다. 키가 이미 있으므로 그 우회는 불필요하다.
          access_token=$(node -e '
            const crypto = require("node:crypto");

            const key = JSON.parse(process.env.GCP_SERVICE_ACCOUNT_KEY);
            const now = Math.floor(Date.now() / 1000);
            const base64url = (input) =>
              Buffer.from(input).toString("base64url");

            const header = base64url(
              JSON.stringify({ alg: "RS256", typ: "JWT", kid: key.private_key_id }),
            );
            const claims = base64url(
              JSON.stringify({
                iss: key.client_email,
                scope: "https://www.googleapis.com/auth/chromewebstore",
                aud: key.token_uri,
                iat: now,
                exp: now + 3600,
              }),
            );

            const signature = crypto
              .createSign("RSA-SHA256")
              .update(`${header}.${claims}`)
              .sign(key.private_key)
              .toString("base64url");

            const body = new URLSearchParams({
              grant_type: "urn:ietf:params:oauth:grant-type:jwt-bearer",
              assertion: `${header}.${claims}.${signature}`,
            });

            fetch(key.token_uri, {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body,
            })
              .then(async (response) => {
                const data = await response.json();
                if (!response.ok || !data.access_token) {
                  console.error(JSON.stringify(data));
                  process.exit(1);
                }
                process.stdout.write(data.access_token);
              })
              .catch((error) => {
                console.error(error.message);
                process.exit(1);
              });
          ')

          if [ -z "$access_token" ]; then
            echo "Failed to obtain Chrome Web Store access token" >&2
            exit 1
          fi
          echo "::add-mask::$access_token"

          zip_file=$(ls dist/*.zip | head -n 1)
          if [ -z "$zip_file" ]; then
            echo "No extension zip found in dist/" >&2
            exit 1
          fi

          upload_url="https://chromewebstore.googleapis.com/upload/v2/publishers/${CHROME_WEBSTORE_PUBLISHER_ID}/items/${CHROME_EXTENSION_ID}:upload"
          response_file=$(mktemp)
          status=$(curl -sS -o "$response_file" -w "%{http_code}" \
            -H "Authorization: Bearer ${access_token}" \
            -X POST \
            -T "$zip_file" \
            "$upload_url")

          echo "Upload response status: $status"
          cat "$response_file"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Chrome Web Store upload failed" >&2
            exit 1
          fi

          if [ "$SHOULD_PUBLISH" != "true" ]; then
            echo "Skipping Chrome Web Store publish request because publish=false."
            exit 0
          fi

          publish_url="https://chromewebstore.googleapis.com/v2/publishers/${CHROME_WEBSTORE_PUBLISHER_ID}/items/${CHROME_EXTENSION_ID}:publish"
          publish_response_file=$(mktemp)
          publish_status=$(curl -sS -o "$publish_response_file" -w "%{http_code}" \
            -H "Authorization: Bearer ${access_token}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d '{}' \
            "$publish_url")

          echo "Publish response status: $publish_status"
          cat "$publish_response_file"
          if [ "$publish_status" -lt 200 ] || [ "$publish_status" -ge 300 ]; then
            echo "Chrome Web Store publish request failed" >&2
            exit 1
          fi
